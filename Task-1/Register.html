<head>
    <title>
        Registration Form
    </title>
</head>
<link rel="stylesheet" href="registerof.css">
<body style="background-color: aquamarine;">
<center>
    <div class=" container">
    <h1>Vel Tech University</h1>

    
    <form id="registrationform">
    <label for="">Name</label><br>
    <input type="text" id="name" placeholder="Enter your name" ><br>
    <label for="">email</label><br>
    <input type="text" id="email" placeholder="Enter your email" ><br>
    <label for="">Date of Birth</label><br>
    <input type="date" id="date" placeholder="Enter your password" ><br>
    <label for="">Department</label><br>
    <select name="department" id="department">
        <option value="cse">Select your department</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="eee">EEE</option>
        <option value="law">Law</option>
    </select><br>
    <label for="">Phone Number</label><br>
    <input type="tel" name="phno" id="phoneno" placeholder="Enter 10 digit number"><br>
    <label for="">Gender</label><br>
    <input type="radio" name="gender" id="gender">Male
    <input type="radio" name="gender" id="gender">Female
    <input type="radio" name="gender" id="gender">Others <br>
    <button onclick="register()" type="submit"style="color: rgb(5, 7, 5); background-color: rgb(31, 179, 18);">Register</button>
    <p id="result"></p>
</form>
</div>

<script src="regitration.js"></script>
</body>
</center>
